/* Feature list and bootstrap table css */
/* Make FeatureList behave like normal Bootstrap content */

#map-container {
  position: relative;   /* ✅ critical */
  height: 870px;
  width: 100%;
  overflow: hidden;     /* prevents page scroll */
}


#map {
    height: 100%;
    width: 100%;
    position: relative;
}        

/* Attribute table shell */
#featureListShell {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;

  height: 260px;
  min-height: 32px;
  max-height: 70%;

  background: #fff;
  z-index: 1000;

  display: flex;
  flex-direction: column;

  border-top: 1px solid #dee2e6;
  box-shadow: 0 -2px 8px rgba(0,0,0,.2);
}


/* ---------- BODY ---------- */

#featureListShell .card-body {
  display: flex;
  flex-direction: column;
  flex: 1;
  overflow: hidden;
}

/* Selected table row */
#featureTable tbody tr.row-selected {
  background-color: rgba(13, 110, 253, 0.2) !important;
}

#featureListShell::before {
  content: "";
  height: 6px;
  cursor: ns-resize;
  background: #e9ecef;
  border-top: 1px solid #ccc;
}


#featureListHeader .ol-control {
  position: static !important;
  width: 100%;
  box-shadow: none;
}

/* Remove FeatureList's internal list UI */
#featureListHeader .ol-content {
  display: none;
}

.dataTables_wrapper {
  height: 100%;
  display: flex;
  flex-direction: column;
  padding: 10px;
}


.dataTables_wrapper .row:first-child {
  position: sticky;
  top: 0;
  z-index: 5;
  background: white;
  padding: 0.25rem 0.5rem;
  border-bottom: 1px solid #dee2e6;
}

.dataTables_filter {
  display: flex;
  align-items: center;
  white-space: nowrap;
}


/* Optional polish */
.dataTables_filter input {
  margin-left: 0.5rem;
}


.dataTables_scroll {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* Actual scrolling area */
.dataTables_scrollBody {
  flex: 1; 
  overflow: auto; 
}


/* ---------- COLUMN HEADERS ---------- */
.dataTables_scrollHead {
  position: relative;
  top: 40px;
  z-index: 15;
  background: #fff;
  border-bottom: 1px solid #dee2e6;
  top: 0;
}

.dataTables_scrollHead table {
  margin-bottom: 0 !important;
}


/* ---------- TOP BAR ---------- */
.dt-top {
  position: sticky;
  top: 0;
  z-index: 20;

  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 0.75rem;

  background: #fff;
  padding: 0.25rem 0.5rem;
  border-bottom: 1px solid #dee2e6;
}


/* Keep Search inline */

.dataTables_filter {
  display: flex;
  align-items: center;
  white-space: nowrap;
}

.dataTables_filter input {
  margin-left: 0.5rem;
}




/* FOOTER */


.dt-bottom {
  position: sticky;
  bottom: 0;
  height: 32px;

  display: flex;
  align-items: center;
  justify-content: space-between;

  background: #fff;
  border-top: 1px solid #dee2e6;
  padding: 0 0.5rem;
  z-index: 20;
}

.dataTables_info,
.dataTables_paginate {
  white-space: nowrap;
}


.dataTables_length label {
  white-space: nowrap;
}


/* Ensure pagination stays clickable */
.dt-bottom * {
  pointer-events: auto;
}


#tableResizeHandle {
  height: 6px;
  cursor: ns-resize;
  background: #dee2e6;
  border-top: 1px solid #ccc;
}

#featureTable th,
#featureTable td {
  white-space: nowrap;
}




#featureListHeader {
  cursor: pointer;
  user-select: none;
}


/* Feature list and bootstrap table css End */
